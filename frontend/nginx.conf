server {
    # Bind a high port so the container runs as a non-root user without needing
    # the NET_BIND_SERVICE capability (binding <1024 requires it).
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Write all runtime temp files under a dedicated directory that is mounted as
    # a writable emptyDir in Kubernetes (see k8s manifests). This keeps the
    # container's root filesystem read-only-friendly: nginx never writes to
    # /var/cache/nginx or the default /tmp paths. The matching `pid` directive is
    # main-context-only (it cannot live in this conf.d server block), so it is
    # supplied via the startup command `-g 'pid /tmp/nginx/nginx.pid;'`
    # (see Dockerfile CMD) — both point at the same writable /tmp/nginx mount.
    client_body_temp_path /tmp/nginx/client_temp;
    proxy_temp_path       /tmp/nginx/proxy_temp;
    fastcgi_temp_path     /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path       /tmp/nginx/uwsgi_temp;
    scgi_temp_path        /tmp/nginx/scgi_temp;

    # Docker's embedded DNS. Resolving the upstream at request time (via a
    # variable) means nginx will start even if the backend isn't up yet, instead
    # of failing to load the config — the usual cause of a dead frontend container.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $backend_upstream "backend:8000";

    # Lightweight healthcheck served by nginx itself (no upstream dependency).
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Optional runtime CSS override. If a file is mounted (e.g. from a
    # Kubernetes ConfigMap) at /usr/share/nginx/html/custom.css it is served;
    # otherwise we return an empty no-op stylesheet with 200 so the page's
    # <link rel="stylesheet" href="/custom.css"> never 404s.
    location = /custom.css {
        default_type text/css;
        add_header Cache-Control "no-store";
        try_files /custom.css @empty_css;
    }
    location @empty_css {
        default_type text/css;
        return 200 "";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to the backend service.
    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-Id $request_id;
    }

    location = /healthz {
        proxy_pass http://$backend_upstream/healthz;
        proxy_set_header Host $host;
    }
}
