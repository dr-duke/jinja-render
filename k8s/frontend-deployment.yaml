apiVersion: apps/v1
kind: Deployment
metadata:
  name: jinja-render-frontend
  labels:
    app: jinja-render
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jinja-render
      component: frontend
  template:
    metadata:
      labels:
        app: jinja-render
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        # nginx:alpine's default unprivileged-capable user.
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          # Replace with your built/pushed image reference.
          image: jinja-render-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # Required only because nginx binds port 80. Alternatively use an
              # unprivileged nginx image listening on a high port (e.g. 8080).
              add: ["NET_BIND_SERVICE"]
          volumeMounts:
            # Mount the runtime CSS override over the served file. nginx returns
            # an empty no-op stylesheet if this is absent, so the mount is
            # optional and safe to omit.
            - name: custom-css
              mountPath: /usr/share/nginx/html/custom.css
              subPath: custom.css
              readOnly: true
      volumes:
        - name: custom-css
          configMap:
            name: jinja-render-custom-css
---
apiVersion: v1
kind: Service
metadata:
  name: jinja-render-frontend
  labels:
    app: jinja-render
    component: frontend
spec:
  selector:
    app: jinja-render
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
