apiVersion: apps/v1
kind: Deployment
metadata:
  name: jinja-render-frontend
  labels:
    app: jinja-render
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jinja-render
      component: frontend
  template:
    metadata:
      labels:
        app: jinja-render
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        # uid 101 owns the runtime dirs in the unprivileged nginx base image
        # (nginxinc/nginx-unprivileged) the frontend Dockerfile builds on.
        runAsUser: 101
        runAsGroup: 101
        # fsGroup chowns the nginx-tmp emptyDir (below) to gid 101 so the
        # non-root nginx user can write its pid/temp files into it.
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          # Replace with your built/pushed image reference.
          image: jinja-render-frontend:latest
          # IfNotPresent suits a locally built+loaded image (kind/minikube). If
          # you instead pull a floating "latest" from a registry, switch to
          # Always or pin a concrete tag, then `kubectl rollout restart` to
          # avoid serving a stale cached image.
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            # All nginx writes (pid + temp paths) go to the nginx-tmp emptyDir
            # mounted at /tmp/nginx (see nginx.conf), so the root FS is read-only.
            readOnlyRootFilesystem: true
            # nginx listens on 8080 (see nginx.conf), so binding needs no extra
            # capability — run fully non-root with all capabilities dropped.
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Writable scratch dir for nginx's pid and temp files, required
            # because the root filesystem is read-only.
            - name: nginx-tmp
              mountPath: /tmp/nginx
            # Mount the runtime CSS override over the served file. nginx returns
            # an empty no-op stylesheet if this is absent, so the mount is
            # optional and safe to omit.
            - name: custom-css
              mountPath: /usr/share/nginx/html/custom.css
              subPath: custom.css
              readOnly: true
      volumes:
        # Ephemeral writable dir for nginx pid/temp; chowned to gid 101 via the
        # pod-level fsGroup so the non-root nginx user can write to it.
        - name: nginx-tmp
          emptyDir: {}
        - name: custom-css
          configMap:
            name: jinja-render-custom-css
---
apiVersion: v1
kind: Service
metadata:
  name: jinja-render-frontend
  labels:
    app: jinja-render
    component: frontend
spec:
  selector:
    app: jinja-render
    component: frontend
  ports:
    # External port 80; targetPort "http" resolves to the container's 8080.
    - name: http
      port: 80
      targetPort: http
