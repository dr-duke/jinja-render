apiVersion: apps/v1
kind: Deployment
metadata:
  name: jinja-render
  labels:
    app: jinja-render
    component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jinja-render
      component: app
  template:
    metadata:
      labels:
        app: jinja-render
        component: app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # Replace with your built/pushed image reference.
          image: jinja-render-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            # FastAPI/uvicorn serves both the API and the built SPA on 8000.
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: jinja-render-config
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            # /readyz verifies the render worker pool is initialized and ready.
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              # Render is CPU-bound; a limit contains runaway templates per pod.
              cpu: "1"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Writable scratch dir. The app does not normally write to disk, but
            # a read-only root FS needs /tmp writable for the multiprocessing
            # render pool's transient needs on some platforms.
            - name: tmp
              mountPath: /tmp
            # Optional runtime CSS override. FastAPI serves /custom.css from the
            # static dir; mounting this single file overrides it without an
            # image rebuild. nginx is no longer involved.
            - name: custom-css
              mountPath: /app/static/custom.css
              subPath: custom.css
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: custom-css
          configMap:
            name: jinja-render-custom-css
---
apiVersion: v1
kind: Service
metadata:
  name: jinja-render
  labels:
    app: jinja-render
    component: app
spec:
  selector:
    app: jinja-render
    component: app
  ports:
    # External port 80; targetPort "http" resolves to the container's 8000.
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jinja-render
  labels:
    app: jinja-render
    component: app
spec:
  ingressClassName: nginx
  rules:
    # Exposes the whole app (SPA + /api on the same origin). Override the host
    # for your cluster. Point jinja-render.local at the ingress IP in /etc/hosts
    # for local testing, or skip the Ingress and port-forward the Service.
    - host: jinja-render.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jinja-render
                port:
                  name: http
