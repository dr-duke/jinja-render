# Values for deploying jinja-render with the Nixys universal chart.
#
#   Chart: nxs-universal-chart (https://github.com/nixys/nxs-universal-chart)
#   Pinned/tested against chart version 3.1.0 (appVersion v1).
#
# This renders both the backend (FastAPI, port 8000) and the frontend (nginx
# serving the built SPA, container port 8080), their Services, an Ingress that
# exposes the frontend (which proxies /api to the backend), a ConfigMap with the
# backend JR_* runtime settings, and an optional ConfigMap that overrides the
# frontend's /custom.css at runtime.
#
# Namespace: the chart has no namespace value — resources land in the Helm
# release namespace (.Release.Namespace). Install into the jinja-render namespace
# with `-n jinja-render --create-namespace` (see the install command below).
#
# Render / install (always into the jinja-render namespace):
#   helm template jinja-render oci://registry.nixys.ru/nuc/nxs-universal-chart \
#     --version 3.1.0 -n jinja-render -f k8s/values-nxs-universal-chart.yaml
#   helm upgrade --install jinja-render \
#     oci://registry.nixys.ru/nuc/nxs-universal-chart --version 3.1.0 \
#     -n jinja-render --create-namespace \
#     -f k8s/values-nxs-universal-chart.yaml
#
# IMPORTANT: override the image tags to the tag/sha you actually pushed to GHCR,
# e.g. --set 'deployments.backend.containers.backend.imageTag=sha-abc1234'.
# See k8s/README.md for the full publish-then-deploy workflow.
#
# Assumptions (the chart is intentionally generic, so these are explicit):
#   - Images live at ghcr.io/dr-duke/jinja-render/{backend,frontend}.
#   - The frontend image already tolerates a missing /custom.css (nginx config
#     falls back to an empty stylesheet), so the CSS ConfigMap mount is optional.
#   - The chart prefixes resource names with the release name via
#     helpers.app.fullname; Services and volume configMap refs use that same
#     helper, so in-cluster references line up automatically.

nameOverride: jinja-render

# Fallback pull policy. Each container below sets imagePullPolicy: Always
# explicitly (the images use the floating "latest" tag), so this default only
# applies to any container that omits its own policy.
defaultImagePullPolicy: IfNotPresent

# Cluster-wide defaults applied to every workload below.
generic:
  labels:
    app.kubernetes.io/part-of: jinja-render
  # Run every pod as the non-root user baked into both Dockerfiles.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# --- ConfigMaps ---------------------------------------------------------------
configMaps:
  # Backend runtime configuration. Keys map 1:1 to backend/app/core/config.py
  # (env_prefix JR_). Consumed by the backend container via envsFromConfigmap.
  config:
    labels:
      component: backend
    data:
      JR_app_name: jinja-render
      JR_debug: "false"
      JR_max_template_bytes: "524288"
      JR_max_data_bytes: "1048576"
      JR_max_data_depth: "50"
      JR_render_timeout_seconds: "2.0"
      JR_render_pool_size: "2"
      JR_rate_limit_enabled: "true"
      JR_rate_limit_requests_per_minute: "120"
      JR_rate_limit_burst: "40"
      JR_ansible_facts_enabled: "true"
      JR_ansible_facts_default: "true"
      JR_docs_swagger_path: /swagger
      JR_openapi_url: /openapi.json
      JR_cors_origins: '["http://localhost:5173"]'
  # Optional runtime CSS override mounted over the frontend's served
  # /usr/share/nginx/html/custom.css. Edit to restyle without rebuilding.
  custom-css:
    labels:
      component: frontend
    data:
      custom.css: |
        /* Example override: tweak the accent color. Remove or replace freely. */
        /* :root { --accent: #e08c3b; } */

# --- Deployments --------------------------------------------------------------
deployments:
  backend:
    labels:
      component: backend
    replicas: 1
    extraSelectorLabels:
      component: backend
    containers:
      backend:
        image: ghcr.io/dr-duke/jinja-render/backend
        # Tag to deploy. Pin a concrete tag/sha for reproducible deploys:
        #   --set deployments.backend.containers.backend.imageTag=sha-abc1234
        imageTag: latest
        # Re-pull on every pod start so a freshly pushed "latest" is picked up.
        imagePullPolicy: Always
        securityContext:
          mergeWithGeneric: true
          readOnlyRootFilesystem: true
        ports:
          - name: http
            containerPort: 8000
        envsFromConfigmap:
          config:
            - JR_app_name
            - JR_debug
            - JR_max_template_bytes
            - JR_max_data_bytes
            - JR_max_data_depth
            - JR_render_timeout_seconds
            - JR_render_pool_size
            - JR_rate_limit_enabled
            - JR_rate_limit_requests_per_minute
            - JR_rate_limit_burst
            - JR_ansible_facts_enabled
            - JR_ansible_facts_default
            - JR_docs_swagger_path
            - JR_openapi_url
            - JR_cors_origins
        livenessProbe:
          httpGet:
            path: /livez
            port: http
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          # /readyz verifies the render worker pool is initialized and ready.
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 256Mi

  frontend:
    labels:
      component: frontend
    replicas: 1
    extraSelectorLabels:
      component: frontend
    # Pod-level securityContext. The unprivileged nginx image owns its runtime
    # dirs (cache, pid) as uid 101, so the pod MUST run as 101 — override the
    # generic runAsUser (10001) here, otherwise nginx cannot write its pid/cache.
    # fsGroup 101 makes the kernel chown the nginx-tmp emptyDir (below) to gid
    # 101, so uid 101 can create its pid/temp files there even though an emptyDir
    # is otherwise root-owned.
    securityContext:
      mergeWithGeneric: true
      runAsUser: 101
      runAsGroup: 101
      fsGroup: 101
    containers:
      frontend:
        image: ghcr.io/dr-duke/jinja-render/frontend
        # Tag to deploy. With the floating "latest" tag, imagePullPolicy MUST be
        # Always (below) or the node serves a stale cached image — the usual
        # cause of "old container still running after a new push". For
        # reproducible deploys, pin a concrete tag/sha instead:
        #   --set deployments.frontend.containers.frontend.imageTag=sha-abc1234
        imageTag: latest
        # Re-pull on every pod start so a freshly pushed "latest" is picked up.
        imagePullPolicy: Always
        securityContext:
          mergeWithGeneric: true
          # All nginx writes (pid + temp paths) are redirected to the writable
          # nginx-tmp emptyDir mounted at /tmp/nginx (see nginx.conf and the
          # volumeMounts/volumes below), so the root filesystem can stay
          # read-only.
          readOnlyRootFilesystem: true
        ports:
          # nginx listens on 8080 so the pod runs non-root without
          # NET_BIND_SERVICE (binding a port <1024 would require it).
          - name: http
            containerPort: 8080
        livenessProbe:
          httpGet:
            path: /nginx-health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /nginx-health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 250m
            memory: 128Mi
        volumeMounts:
          # Writable scratch dir for nginx's pid and temp files. Required because
          # the container's root FS is read-only (readOnlyRootFilesystem: true).
          - name: nginx-tmp
            mountPath: /tmp/nginx
          # Overlay just the single CSS file with subPath so the rest of the
          # served web root stays intact.
          - name: custom-css
            mountPath: /usr/share/nginx/html/custom.css
            subPath: custom.css
            readOnly: true
    volumes:
      # Ephemeral writable dir for nginx pid/temp; chowned to gid 101 by the
      # pod-level fsGroup so the non-root nginx user can write to it.
      - name: nginx-tmp
        type: emptyDir
      # The volume's configMap name is resolved through helpers.app.fullname
      # using this .name, matching the "custom-css" entry under configMaps above.
      - name: custom-css
        type: configMap

# --- Services -----------------------------------------------------------------
services:
  backend:
    labels:
      component: backend
    # Must match deployments.backend.extraSelectorLabels to route traffic.
    extraSelectorLabels:
      component: backend
    ports:
      - name: http
        port: 8000
        targetPort: http
  frontend:
    labels:
      component: frontend
    extraSelectorLabels:
      component: frontend
    ports:
      # Service exposes the conventional port 80; targetPort "http" resolves to
      # the container's 8080 listener.
      - name: http
        port: 80
        targetPort: http

# --- Ingress ------------------------------------------------------------------
# Exposes only the frontend; the SPA proxies /api and /healthz to the backend
# in-cluster (see frontend/nginx.conf), so the backend is never published.
# Override the host: --set 'ingresses.jinja-render\.local.hosts[0].hostname=your.host'
# or edit the key below. ingressClassName defaults to nginx — adjust for your
# controller (e.g. traefik). servicePort "http" matches services.frontend above.
ingresses:
  jinja-render.local:
    labels:
      component: frontend
    ingressClassName: nginx
    hosts:
      - paths:
          - path: /
            pathType: Prefix
            serviceName: frontend
            servicePort: http
