# Values for deploying jinja-render with the Nixys universal chart.
#
#   Chart: nxs-universal-chart (https://github.com/nixys/nxs-universal-chart)
#   Pinned/tested against chart version 3.1.0 (appVersion v1).
#
# This renders a SINGLE application container: FastAPI serves both the API and
# the built React/Vite SPA on one origin (container port 8000). It also renders
# the Service, an Ingress exposing the whole app, a ConfigMap with the backend
# JR_* runtime settings, and an optional ConfigMap that overrides the app's
# /custom.css at runtime. There is no separate frontend/nginx container anymore.
#
# Namespace: the chart has no namespace value — resources land in the Helm
# release namespace (.Release.Namespace). Install into the jinja-render namespace
# with `-n jinja-render --create-namespace` (see the install command below).
#
# Render / install (always into the jinja-render namespace):
#   helm template jinja-render oci://registry.nixys.ru/nuc/nxs-universal-chart \
#     --version 3.1.0 -n jinja-render -f k8s/values-nxs-universal-chart.yaml
#   helm upgrade --install jinja-render \
#     oci://registry.nixys.ru/nuc/nxs-universal-chart --version 3.1.0 \
#     -n jinja-render --create-namespace \
#     -f k8s/values-nxs-universal-chart.yaml
#
# IMPORTANT: override the image tag to the tag/sha you actually pushed to GHCR,
# e.g. --set 'deployments.app.containers.app.imageTag=sha-abc1234'.
# See k8s/README.md for the full publish-then-deploy workflow.
#
# Assumptions (the chart is intentionally generic, so these are explicit):
#   - The image lives at ghcr.io/dr-duke/jinja-render/app.
#   - The app tolerates a missing /custom.css (FastAPI returns an empty
#     stylesheet), so the CSS ConfigMap mount is optional.
#   - The chart prefixes resource names with the release name via
#     helpers.app.fullname; Services and volume configMap refs use that same
#     helper, so in-cluster references line up automatically.

nameOverride: jinja-render

# Fallback pull policy. The container below sets imagePullPolicy: Always
# explicitly (the image uses the floating "latest" tag), so this default only
# applies to any container that omits its own policy.
defaultImagePullPolicy: IfNotPresent

# Cluster-wide defaults applied to every workload below.
generic:
  labels:
    app.kubernetes.io/part-of: jinja-render
  # Run every pod as the non-root user baked into the Dockerfile.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# --- ConfigMaps ---------------------------------------------------------------
configMaps:
  # Backend runtime configuration. Keys map 1:1 to backend/app/core/config.py
  # (env_prefix JR_). Consumed by the app container via envsFromConfigmap.
  config:
    labels:
      component: app
    data:
      JR_app_name: jinja-render
      JR_debug: "false"
      JR_max_template_bytes: "524288"
      JR_max_data_bytes: "1048576"
      JR_max_data_depth: "50"
      JR_render_timeout_seconds: "2.0"
      JR_render_pool_size: "2"
      JR_rate_limit_enabled: "true"
      JR_rate_limit_requests_per_minute: "120"
      JR_rate_limit_burst: "40"
      JR_ansible_facts_enabled: "true"
      JR_ansible_facts_default: "true"
      JR_docs_swagger_path: /swagger
      JR_openapi_url: /openapi.json
      JR_static_dir: /app/static
      JR_cors_origins: '["http://localhost:5173"]'
  # Optional runtime CSS override mounted over the app's served
  # /app/static/custom.css. Edit to restyle without rebuilding.
  custom-css:
    labels:
      component: app
    data:
      custom.css: |
        /* Example override: tweak the accent color. Remove or replace freely. */
        /* :root { --accent: #e08c3b; } */

# --- Deployments --------------------------------------------------------------
deployments:
  app:
    labels:
      component: app
    replicas: 1
    extraSelectorLabels:
      component: app
    containers:
      app:
        image: ghcr.io/dr-duke/jinja-render/app
        # Tag to deploy. Pin a concrete tag/sha for reproducible deploys:
        #   --set deployments.app.containers.app.imageTag=sha-abc1234
        imageTag: latest
        # Re-pull on every pod start so a freshly pushed "latest" is picked up.
        imagePullPolicy: Always
        securityContext:
          mergeWithGeneric: true
          readOnlyRootFilesystem: true
        ports:
          # uvicorn serves API + SPA on 8000 (>1024, so no NET_BIND_SERVICE).
          - name: http
            containerPort: 8000
        envsFromConfigmap:
          config:
            - JR_app_name
            - JR_debug
            - JR_max_template_bytes
            - JR_max_data_bytes
            - JR_max_data_depth
            - JR_render_timeout_seconds
            - JR_render_pool_size
            - JR_rate_limit_enabled
            - JR_rate_limit_requests_per_minute
            - JR_rate_limit_burst
            - JR_ansible_facts_enabled
            - JR_ansible_facts_default
            - JR_docs_swagger_path
            - JR_openapi_url
            - JR_static_dir
            - JR_cors_origins
        livenessProbe:
          httpGet:
            path: /livez
            port: http
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          # /readyz verifies the render worker pool is initialized and ready.
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 256Mi
        # /tmp must be writable under readOnlyRootFilesystem for the render
        # pool's transient needs; the custom.css overlay is optional.
        volumeMounts:
          - name: tmp
            mountPath: /tmp
          - name: custom-css
            mountPath: /app/static/custom.css
            subPath: custom.css
            readOnly: true
    volumes:
      - name: tmp
        type: emptyDir
      # The volume's configMap name is resolved through helpers.app.fullname
      # using this .name, matching the "custom-css" entry under configMaps above.
      - name: custom-css
        type: configMap

# --- Services -----------------------------------------------------------------
services:
  app:
    labels:
      component: app
    # Must match deployments.app.extraSelectorLabels to route traffic.
    extraSelectorLabels:
      component: app
    ports:
      # Service exposes the conventional port 80; targetPort "http" resolves to
      # the container's 8000 listener.
      - name: http
        port: 80
        targetPort: http

# --- Ingress ------------------------------------------------------------------
# Exposes the whole app (SPA + /api on the same origin). Override the host:
#   --set 'ingresses.jinja-render\.local.hosts[0].hostname=your.host'
# or edit the key below. ingressClassName defaults to nginx — adjust for your
# controller (e.g. traefik). servicePort "http" matches services.app above.
ingresses:
  jinja-render.local:
    labels:
      component: app
    ingressClassName: nginx
    hosts:
      - paths:
          - path: /
            pathType: Prefix
            serviceName: app
            servicePort: http
