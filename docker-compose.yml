services:
  backend:
    build: ./backend
    environment:
      JR_DEBUG: "false"
      JR_RENDER_TIMEOUT_SECONDS: "2.0"
    expose:
      - "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        ["CMD", "python", "-c",
         "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
    # Hardening: drop privileges, no privilege escalation.
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider",
         "http://127.0.0.1:8080/nginx-health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
