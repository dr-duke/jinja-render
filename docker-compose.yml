# Single-container app: FastAPI serves the built SPA and the API on one origin.
# Web UI and API are reachable at http://localhost:8080 (host) -> 8000 (container).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      JR_DEBUG: "false"
      JR_RENDER_TIMEOUT_SECONDS: "2.0"
    ports:
      - "8080:8000"
    healthcheck:
      test:
        ["CMD", "python", "-c",
         "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/livez').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
    # Hardening: drop privileges, no privilege escalation.
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped
